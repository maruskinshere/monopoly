<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #0b1220;
            --muted: #9aa4b2;
            --card: #111a2b;
            --line: #1f2a44;
            --good: #22c55e;
            --bad: #ef4444;
            --brand: #60a5fa;
            --bg: #0f172a;
        }
        *{
            box-sizing: border-box;
        }
        body{
            background: radial-gradient(80% 60% at 50% -10%, #1e293b 0%, #0b1220 60%, #0a0f1c 100%);
           margin: 0px;
           color: white;
        }
        .main{
            max-width: 1100px;
            margin: auto;
        }
        .first{
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .02));
            padding: 20px;
        }
        .newgame{
            background: transparent;
            border: 1px solid var(--line);
            color: white;
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
        }
        .second{
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 20px;
            margin-top: 16px;
        }
        .name{
            background: transparent;
            border: 1px solid var(--line);
            color: white;
            border-radius: 12px;
            padding: 10px 14px;
        }
        .start{
            background-color: #1d4ed8;
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
            outline: none;
            color: white;
            border: none;
            margin-left: 10px;
        }
        .info{
            display: flex;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 20px;
            margin-top: 16px;
            gap: 80px;
        }
        .footer{
            display: flex;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 20px;
            margin-top: 16px;
            justify-content: space-between;
        }
        .done{
            background-color: #1d4ed8;
            border-radius: 12px;
            padding: 7px 17px;
            cursor: pointer;
            outline: none;
            color: white;
            border: none;
        }
        .business{
            display: none;
        }
        .cards{
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 30px;
        }
        .photo{
            width: 100%;
            height: 130px;
            object-fit: cover;
        }
        .sell{
            color: var(--brand);
            padding: 5px 70px;
            font-size: 15px;
    
        }
        .buy{
            color: var(--bad);
            padding: 5px 50px;
            font-size: 15px;
        }
        .news{
            display: none;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="first">
            <div class="firstrow">
            <h1 class="tittle">Monopoly</h1>
            <p class="subtittle">Get backpack, wait for news and see results </p>
        </div>
            <button class="newgame">New game</button>
        </div>
        <div id="second" class="second">
            <input type="text" id="playerName" placeholder="Your name" class="name">
            <button onclick="startGame()" class="start">start</button>
            <p class="rules">Start money: 1000. Buy diffrent businesses, then click "Ready"-receive news, price changes.</p>
        </div>
        <div id="business" class="business">
            <div class="info">
                <div id="player" class="player">Player: </div>
                <div id="money" class="money">Money: </div>
            </div>
            <div id="cards" class="cards">
                
                </div>

            </div>
            <div id="footer" class="footer">
                <p class="footerinfo">You can buy the same shares as many times as you want, until your money are gone.</p>
                <button onclick = "news()"  class="done">Ready</button>
            </div>

        </div>
        <div id="news" class="news">
            <div class="gridNews">
            <h3 class="targetNews">News</h3>
            <div id="list" class="newsList"></div>
        </div>
        <div class="startBar">
            <p class="startMoney"></p>
            <p class="share"></p>
            <p class="totall"></p>
        </div>
        <div class="finallFooter">
            <button class="restart"></button>
            <span class="tip"></span>
        </div>
        </div>
    </div>

            {

                bad: ['Холодная весна задержала поставки цветов.',

        let money = 1000;
        let name = "";
        function startGame(){
            let input = document.getElementById("playerName");
            let value = input.value.trim();
            if (value === ""){
                alert("Type a name");
                return;
            };
            name = value;
            document.getElementById("player").innerHTML = name;
            document.getElementById("money").innerHTML = money;
            document.getElementById("second").style.display = "none";
            document.getElementById("business").style.display = "block";
            market();
        }
        function market(){
            const cards = document.getElementById("cards")
            let i;
            for (i = 0; i < businesses.length; i = i + 1){
                const b = businesses[i];

                const html = 
                '<div class="card">' +
                    '<img src=" '+ b.img +' " alt="" class="photo">' +
                    '<div class="name"> '+ b.name +' </div>' +
                    '<div class="price"> '+ b.price +' </div>' +
                    '<div id="owned-' + i +'" class="owned"> '+ b.owned +' </div>' +
                    '<div class="sellbuy">' +
                        '<button onclick="sell('+ i +')" class="sell">Sell</button>' +
                        '<button onclick="buy('+ i +')" class="buy">Buy</button>' +
                    '</div>';
                    cards.innerHTML = cards.innerHTML + html
                    
            }
        }
        function sell(index){
            const a = businesses[index]
            if(a.owned > 0){
                a.owned = a.owned - 1
                money = money + a.price
                document.getElementById('owned-' + index).textContent = a.owned
                document.getElementById("money").innerHTML = money;
            }
            else{
                alert("You do not have businesses")
            }
            

        }
        function buy(index){
            const b = businesses[index]
            if(money >= b.price){
                money = money - b.price
                b.owned = b.owned + 1
                document.getElementById("money").innerHTML = money;
                document.getElementById('owned-' + index).textContent = b.owned;
            }
            else{
                alert("Not enough money")
            }
        }
    function news(){
        document.getElementById("business").style.display = "none";
        document.getElementById("news").style.display = "block";
        document.getElementById("footer").style.display = "none";
        newsProcents = []
        let i 
        for(i = 0; i < businesses; i = i + 1){
            const p = randomInt(-30, 30)
            newsProcents.push(p)

        }

    }

</html>
